<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>11111MindAR — Borovik1</title>

  <!-- Как в официальных примерах MindAR (A-Frame + mindar-image-aframe) -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#000; }
    #unlockBtn{
      position: fixed; z-index: 9999;
      top: 14px; left: 50%; transform: translateX(-50%);
      padding: 12px 16px; border: 0; border-radius: 10px;
      background: #111; color: #fff; font: 16px system-ui, -apple-system, Segoe UI, Roboto, Arial;
      opacity: 0.92;
    }
  </style>
</head>

<body>
  <!-- 1) Кнопка нужна, чтобы гарантированно разрешить video.play() на телефонах -->
  <button id="unlockBtn">▶️ Включить видео</button>

  <!-- 2) Камера стартует автоматически (как в minimal/basic примерах) :contentReference[oaicite:2]{index=2} -->
  <a-scene
    mindar-image="imageTargetSrc: ./borovik1g.mind; uiScanning: yes; uiLoading: yes;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-assets>
      <video id="promoVideo"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      >
        <source src="./borovik1.mp4" type="video/mp4" />
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

    <!-- 3) ВАЖНО: скрыто, пока target не найден -->
    <a-entity id="t0" mindar-image-target="targetIndex: 0" visible="false">
      <a-plane
        width="1"
        height="0.5625"
        material="shader: flat; src: #promoVideo"
      ></a-plane>
    </a-entity>
  </a-scene>

  <script>
    const videoEl = document.getElementById('promoVideo');
    const targetEl = document.getElementById('t0');
    const btn = document.getElementById('unlockBtn');
    const sceneEl = document.querySelector('a-scene');

    let unlocked = false;

    // Разлочить воспроизведение (но НЕ показывать видео без targetFound)
    btn.addEventListener('click', async () => {
      try {
        await videoEl.play();
        videoEl.pause();
        videoEl.currentTime = 0;
        unlocked = true;
        btn.style.display = 'none';
      } catch (e) {
        alert('Видео не разлочилось: ' + e);
      }
    });

    targetEl.addEventListener('targetFound', async () => {
      targetEl.setAttribute('visible', 'true');
      if (unlocked) {
        try { await videoEl.play(); } catch(e) {}
      }
    });

    targetEl.addEventListener('targetLost', () => {
      videoEl.pause();
      targetEl.setAttribute('visible', 'false');
    });

    // Диагностика
    sceneEl.addEventListener('arReady', () => console.log('MindAR: arReady'));
    sceneEl.addEventListener('arError', (e) => {
      console.error('MindAR: arError', e);
      alert('Камера не запустилась. Проверь разрешение камеры и HTTPS.');
    });
  </script>
</body>
</html>
