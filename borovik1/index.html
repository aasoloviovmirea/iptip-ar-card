<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>1111MindAR Image Video</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #startButton {
      position: fixed;
      z-index: 9999;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 18px;
      background: #222;
      color: #fff;
      border: 0;
      border-radius: 10px;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <button id="startButton">▶️ Запустить сканирование</button>

  <a-scene
    id="scene"
    mindar-image="
      imageTargetSrc: ./borovik1g.mind;
      autoStart: false;
    "
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-assets>
      <video
        id="promoVideo"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      >
        <source src="./borovik1.mp4" type="video/mp4" />
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Скрываем контент, пока таргет не найден -->
    <a-entity id="target0" mindar-image-target="targetIndex: 0" visible="false">
      <a-plane
        width="1"
        height="0.5625"
        material="shader: flat; src: #promoVideo"
      ></a-plane>
    </a-entity>
  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const sceneEl = document.querySelector("#scene");
      const button = document.querySelector("#startButton");
      const videoEl = document.querySelector("#promoVideo");
      const targetEl = document.querySelector("#target0");

      let arSystem = null;
      sceneEl.addEventListener("loaded", () => {
        arSystem = sceneEl.systems["mindar-image-system"];
      });

      // Логи и диагностика
      sceneEl.addEventListener("arReady", () => {
        console.log("MindAR ready");
      });

      sceneEl.addEventListener("arError", (e) => {
        console.error("MindAR failed to start:", e);
        alert("Не удалось запустить камеру. Проверь разрешение на камеру и открой в Chrome/Safari.");
      });

      button.addEventListener("click", async () => {
        try {
          // Запускаем AR ДВИЖОК, а не видео
          arSystem.start(); // официально так запускают при autoStart:false citeturn6view2
          button.style.display = "none";

          // (опционально) "разлочить" воспроизведение на iOS:
          // try { await videoEl.play(); videoEl.pause(); videoEl.currentTime = 0; } catch(e) {}

        } catch (err) {
          console.error(err);
          alert("Ошибка запуска AR: " + err);
        }
      });

      targetEl.addEventListener("targetFound", async () => {
        targetEl.setAttribute("visible", "true");
        try { await videoEl.play(); } catch (e) { /* может быть запрещено автоплеем */ }
      });

      targetEl.addEventListener("targetLost", () => {
        videoEl.pause();
        targetEl.setAttribute("visible", "false");
      });
    });
  </script>
</body>
</html>
